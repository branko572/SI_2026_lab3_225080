name: Deploy Pipeline

on:
  push:
    branches:
      - master
      - feature

jobs:

  lint-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tidy
        run: |
          sudo apt-get update
          sudo apt-get install -y tidy

      - name: Lint HTML
        run: tidy -errors index.html

  docker-push:
    runs-on: ubuntu-latest
    needs: lint-html

    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/si-2026-lab3:${GITHUB_REF_NAME}-latest .

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/si-2026-lab3:${GITHUB_REF_NAME}-latest

  github-pages:
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest
    needs: lint-html

    permissions:
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        uses: actions/deploy-pages@v4